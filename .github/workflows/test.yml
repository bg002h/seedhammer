name: "Test"
on:
  pull_request:
  push:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.26'
    - run: CGO_ENABLED=0 go test ./...
  tinygo-device-build:
    # The TinyGo pico-plus2 build of ./cmd/controller compiles the whole
    # gui -> codex32 import graph, so it exercises codex32 (incl. the dormant
    # GF(1024)/BCH decoder gf1024.go/correct.go) under the 32-bit device
    # target. Host `go test` never compiles the TinyGo build, so enforce it
    # here on every PR/push. Uses the repo's established Nix tinygo toolchain
    # and the same -target pico-plus2 flags as build-firmware.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31.10.6
      with:
        nix_path: nixpkgs=channel:nixos-25.11
    - uses: DeterminateSystems/magic-nix-cache-action@v14
    - name: TinyGo device build (covers codex32)
      run: nix develop --command tinygo build -o /dev/null -target pico-plus2 -stack-size 16kb -gc precise -opt 2 -scheduler tasks ./cmd/controller
